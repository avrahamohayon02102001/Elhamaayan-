<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>El Hama'ayan</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c;
      --dark-bg: #0a0a0a;
      --text-main: #e8e0d0;
    }
    body {
      background: var(--dark-bg);
      color: var(--text-main);
      font-family: 'Cormorant Garamond', serif;
      transition: direction 0.3s ease;
    }
    
    /* Sélecteur de Langue */
    .lang-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      gap: 10px;
    }
    .lang-btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 5px 10px;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      border-radius: 4px;
    }
    .lang-btn:hover { background: rgba(201,168,76,0.1); }

    /* Structure Logo */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 60px 20px; text-align: center; }
    .hero-frame { 
      position: relative; padding: 40px; margin-bottom: 20px;
      border: 1px solid rgba(201,168,76,0.2);
    }
    .logo-img { width: 95%; max-width: 500px; height: auto; display: block; margin: 0 auto; }

    /* Grille Vidéo */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
    .video-card { background: #141414; border-radius: 12px; overflow: hidden; border: 1px solid rgba(201,168,76,0.1); }
    .video-thumb { aspect-ratio: 16/9; background: #222; position: relative; }
    .video-caption { padding: 20px; font-size: 1.2rem; }

    /* Support RTL (Hébreu) */
    body.rtl { direction: rtl; }
    body.rtl .lang-switcher { right: auto; left: 20px; }
  </style>
</head>
<body id="body-tag">

  <div class="lang-switcher">
    <button class="lang-btn" onclick="changeLang('fr')">FR</button>
    <button class="lang-btn" onclick="changeLang('en')">EN</button>
    <button class="lang-btn" onclick="changeLang('he')">עב</button>
  </div>

  <div class="page-wrap">
    <header>
      <div class="hero-frame">
        <img class="logo-img" src="logo.png" onerror="this.src='https://placehold.co/600x200/0a0a0a/c9a84c?text=EL+HAMA%27AYAN'" alt="Logo">
      </div>
      <h2 id="main-title">Découvrez la Sagesse</h2>
    </header>

    <div class="video-grid">
      <div class="video-card">
        <div class="video-thumb"></div>
        <div class="video-caption" id="vid-1">Mysticisme Juif</div>
      </div>
      <div class="video-card">
        <div class="video-thumb"></div>
        <div class="video-caption" id="vid-2">Spiritualité d'Israël</div>
      </div>
    </div>
  </div>

  <script>
    const translations = {
      fr: {
        title: "Découvrez la Sagesse",
        vid1: "Mysticisme Juif",
        vid2: "Spiritualité d'Israël"
      },
      en: {
        title: "Discover Wisdom",
        vid1: "Jewish Mysticism",
        vid2: "Spirituality of Israel"
      },
      he: {
        title: "גלו את החוכמה",
        vid1: "מיסטיקה יהודית",
        vid2: "רוחניות ישראל"
      }
    };

    function changeLang(lang) {
      const body = document.getElementById('body-tag');
      
      // Gérer la direction du texte
      if (lang === 'he') {
        body.classList.add('rtl');
      } else {
        body.classList.remove('rtl');
      }

      // Changer les textes
      document.getElementById('main-title').innerText = translations[lang].title;
      document.getElementById('vid-1').innerText = translations[lang].vid1;
      document.getElementById('vid-2').innerText = translations[lang].vid2;
    }
  </script>
</body>
</html>
